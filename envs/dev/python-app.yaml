apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd-image-updater.argoproj.io/image-list: python-app=brijendrasingh0369/tmp-python-app
    argocd-image-updater.argoproj.io/python-app.update-strategy: latest
    argocd-image-updater.argoproj.io/python-app.allow-tags: |
      regexp:^sha-[a-f0-9]{7}$
spec:
  project: default
  destination:
    namespace: dev
    server: https://kubernetes.default.svc
  source:
    repoURL: https://github.com/brijendra-beehyv/contineous-delivery.git
    path: services/python-app
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - Validate=true
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
